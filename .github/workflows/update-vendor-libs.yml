name: Update Vendor Libraries

on:
  schedule:
    # 9:00 AM GMT+7 is 2:00 AM UTC
    - cron: '0 2 * * 3'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-libs:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.x'

      - name: Run update script
        run: python3 scripts/update_vendor.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update vendor libraries"
          branch: update-vendor-libs
          title: "chore: update vendor libraries"
          body: |
            This PR updates the JavaScript libraries in the `vendor/` directory to their latest versions.
            
            Automatically triggered by GitHub Actions.
          id: create-pr
          delete-branch: true
